<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ - ชาญวิทย์ ดวงบุผา</title>
    <!-- นำเข้า Font Awesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- เปลี่ยนเป็น Google Fonts (Prompt) -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .profile-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 40px 30px;
            text-align: center;
            margin: 20px;
        }

        .profile-img-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #e0f2fe;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .name {
            font-size: 26px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .student-id {
            display: inline-block;
            background-color: #e0f2fe;
            color: #0284c7;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 25px;
        }

        .info-container {
            text-align: left;
            margin-top: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .icon-box {
            width: 40px;
            height: 40px;
            background-color: #f1f5f9;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            color: #0ea5e9;
            font-size: 18px;
        }

        .info-text {
            flex-grow: 1;
        }

        .info-label {
            display: block;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 15px;
            color: #334155;
            font-weight: 500;
        }

        .university-footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f1f5f9;
        }

        .university-name {
            font-size: 14px;
            color: #059669;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }
        
        a:hover {
            color: #0ea5e9;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-img-container">
            <!-- เรียกใช้ชื่อไฟล์รูปภาพของคุณโดยตรง -->
            <img src="unnamed (3).jpg" alt="ชาญวิทย์ ดวงบุผา" class="profile-img">
        </div>
        
        <h1 class="name">ชาญวิทย์ ดวงบุผา</h1>
        <div class="student-id">รหัสนักศึกษา: 694245001</div>

        <div class="info-container">
            <div class="info-item">
                <div class="icon-box"><i class="fas fa-phone-alt"></i></div>
                <div class="info-text">
                    <span class="info-label">เบอร์โทรศัพท์</span>
                    <span class="info-value"><a href="tel:0823914334">082-391-4334</a></span>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-box"><i class="fas fa-envelope"></i></div>
                <div class="info-text">
                    <span class="info-label">อีเมล</span>
                    <span class="info-value"><a href="mailto:chanwitdua@mcru.ac.th">chanwitdua@mcru.ac.th</a></span>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-box"><i class="fas fa-laptop-code"></i></div>
                <div class="info-text">
                    <span class="info-label">สาขาวิชา</span>
                    <span class="info-value">วิทยาการคอมพิวเตอร์</span>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-box"><i class="fas fa-atom"></i></div>
                <div class="info-text">
                    <span class="info-label">คณะ</span>
                    <span class="info-value">วิทยาศาสตร์และเทคโนโลยี</span>
                </div>
            </div>
        </div>

        <div class="university-footer">
            <div class="university-name">
                <i class="fas fa-university"></i> มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง
            </div>
        </div>
    </div>

</body>
</html>
